name: Build Arms Deb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the deb asset to
        required: false
        type: string
      ros_distro:
        description: ROS distro used in the install path
        required: false
        default: jazzy
        type: string
      ocs2_release_tag:
        description: Release tag used to fetch the ocs2_ros2 bundle
        required: false
        type: string
      common_release_tag:
        description: Release tag used to fetch robot_descriptions common
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-arms-deb:
    runs-on: ubuntu-24.04
    env:
      PACKAGE_NAME: arms-ros2-control-jazzy
      DEB_FILE_PREFIX: arms-ros2-control-jazzy
      INSTALL_PREFIX: /opt/ros/jazzy
      OCS2_PACKAGE_NAME: ocs2-ros2-jazzy-mobile-manipulator
      OCS2_DEB_FILE_PREFIX: ocs2-ros2-jazzy-mobile-manipulator
      COMMON_PACKAGE_NAME: robot-descriptions-jazzy-common
      COMMON_DEB_FILE_PREFIX: robot-descriptions-jazzy-common
      DEFAULT_ROS_DISTRO: jazzy
      PREFERRED_OCS2_RELEASE_REPO: legubiao/ocs2_ros2
      FALLBACK_OCS2_RELEASE_REPO: YangLuo-Bionics/ocs2_ros2
      PREFERRED_COMMON_RELEASE_REPO: fiveages/robot_descriptions
      FALLBACK_COMMON_RELEASE_REPO: YangLuo-Bionics/robot_descriptions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize required private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          set -eo pipefail

          if [[ ! -f .gitmodules ]]; then
            exit 0
          fi

          for path in libraries/lina_planning libraries/ocs2_humanoid; do
            url="$(git config --file .gitmodules --get "submodule.${path}.url")"
            [[ -n "${url:-}" ]] || continue

            if [[ -n "${SUBMODULES_TOKEN:-}" ]]; then
              url="${url/git@github.com:/https://x-access-token:${SUBMODULES_TOKEN}@github.com/}"
              url="${url/https:\/\/github.com\//https://x-access-token:${SUBMODULES_TOKEN}@github.com/}"
            else
              url="${url/git@github.com:/https://github.com/}"
            fi

            git submodule set-url "$path" "$url"
          done

          git submodule update --init --depth 1 libraries/lina_planning libraries/ocs2_humanoid

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_ROS_DISTRO: ${{ github.event.inputs.ros_distro }}
          INPUT_OCS2_TAG: ${{ github.event.inputs.ocs2_release_tag }}
          INPUT_COMMON_TAG: ${{ github.event.inputs.common_release_tag }}
        run: |
          set -eo pipefail

          resolve_release_source() {
            local requested_tag="$1"
            local primary_repo="$2"
            local fallback_repo="$3"
            local dependency_name="$4"
            local resolved_repo=""
            local resolved_tag=""

            if [[ -n "${requested_tag:-}" ]]; then
              if gh release view "$requested_tag" --repo "$primary_repo" --json tagName >/dev/null 2>&1; then
                resolved_repo="$primary_repo"
                resolved_tag="$requested_tag"
              elif gh release view "$requested_tag" --repo "$fallback_repo" --json tagName >/dev/null 2>&1; then
                resolved_repo="$fallback_repo"
                resolved_tag="$requested_tag"
              else
                echo "Unable to find release tag ${requested_tag} for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
                exit 1
              fi
            else
              resolved_tag="$(gh release view --repo "$primary_repo" --json tagName --jq .tagName 2>/dev/null || true)"
              if [[ -n "${resolved_tag}" ]]; then
                resolved_repo="$primary_repo"
              else
                resolved_tag="$(gh release view --repo "$fallback_repo" --json tagName --jq .tagName 2>/dev/null || true)"
                if [[ -n "${resolved_tag}" ]]; then
                  resolved_repo="$fallback_repo"
                else
                  echo "Unable to find any published release for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
                  exit 1
                fi
              fi
            fi

            printf '%s\n%s\n' "$resolved_repo" "$resolved_tag"
          }

          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="$INPUT_TAG"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "A release tag is required for workflow_dispatch." >&2
            exit 1
          fi

          version="${tag#v}"
          version="${version#V}"
          version="$(printf '%s' "$version" | sed 's/-/~/g')"

          ros_distro="${INPUT_ROS_DISTRO:-$DEFAULT_ROS_DISTRO}"
          deb_file="${DEB_FILE_PREFIX}_${version}_amd64.deb"

          mapfile -t ocs2_release_info < <(
            resolve_release_source \
              "${INPUT_OCS2_TAG:-}" \
              "$PREFERRED_OCS2_RELEASE_REPO" \
              "$FALLBACK_OCS2_RELEASE_REPO" \
              "ocs2_ros2"
          )
          ocs2_repo="${ocs2_release_info[0]}"
          ocs2_tag="${ocs2_release_info[1]}"
          ocs2_version="${ocs2_tag#v}"
          ocs2_version="${ocs2_version#V}"
          ocs2_version="$(printf '%s' "$ocs2_version" | sed 's/-/~/g')"
          ocs2_deb_file="${OCS2_DEB_FILE_PREFIX}_${ocs2_version}_amd64.deb"

          mapfile -t common_release_info < <(
            resolve_release_source \
              "${INPUT_COMMON_TAG:-}" \
              "$PREFERRED_COMMON_RELEASE_REPO" \
              "$FALLBACK_COMMON_RELEASE_REPO" \
              "robot_descriptions"
          )
          common_repo="${common_release_info[0]}"
          common_tag="${common_release_info[1]}"
          common_version="${common_tag#v}"
          common_version="${common_version#V}"
          common_version="$(printf '%s' "$common_version" | sed 's/-/~/g')"
          common_deb_file="${COMMON_DEB_FILE_PREFIX}_${common_version}_amd64.deb"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ros_distro=$ros_distro" >> "$GITHUB_OUTPUT"
          echo "deb_file=$deb_file" >> "$GITHUB_OUTPUT"
          echo "ocs2_repo=$ocs2_repo" >> "$GITHUB_OUTPUT"
          echo "ocs2_tag=$ocs2_tag" >> "$GITHUB_OUTPUT"
          echo "ocs2_deb_file=$ocs2_deb_file" >> "$GITHUB_OUTPUT"
          echo "common_repo=$common_repo" >> "$GITHUB_OUTPUT"
          echo "common_tag=$common_tag" >> "$GITHUB_OUTPUT"
          echo "common_deb_file=$common_deb_file" >> "$GITHUB_OUTPUT"

      - name: Install system tools
        shell: bash
        run: |
          set -eo pipefail

          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release software-properties-common
          sudo add-apt-repository universe

          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/ros-archive-keyring.gpg

          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME}") main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            python3-rosdep \
            python3-colcon-core \
            python3-colcon-common-extensions \
            python3-vcstool \
            python3-pip \
            python3-catkin-pkg-modules \
            fakeroot \
            dpkg-dev \
            rsync \
            build-essential \
            cmake \
            libeigen3-dev \
            qtbase5-dev \
            qttools5-dev \
            libqt5svg5-dev \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake-core \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-package \
            ros-${{ steps.meta.outputs.ros_distro }}-ros-base

          sudo rosdep init || true
          rosdep update

          source "/opt/ros/${{ steps.meta.outputs.ros_distro }}/setup.bash"
          python3 -c "import ament_package; print('ament_package ready:', ament_package.__file__)"

      - name: Download dependency debs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OCS2_RELEASE_REPO: ${{ steps.meta.outputs.ocs2_repo }}
          COMMON_RELEASE_REPO: ${{ steps.meta.outputs.common_repo }}
        run: |
          set -eo pipefail

          deps_dir="${RUNNER_TEMP}/dependency-debs"
          rm -rf "$deps_dir"
          mkdir -p "$deps_dir"

          gh release download "${{ steps.meta.outputs.ocs2_tag }}" \
            --repo "$OCS2_RELEASE_REPO" \
            --pattern "${{ steps.meta.outputs.ocs2_deb_file }}" \
            --dir "$deps_dir"

          gh release download "${{ steps.meta.outputs.common_tag }}" \
            --repo "$COMMON_RELEASE_REPO" \
            --pattern "${{ steps.meta.outputs.common_deb_file }}" \
            --dir "$deps_dir"

      - name: Install dependency files into ROS prefix
        shell: bash
        run: |
          set -eo pipefail

          deps_dir="${RUNNER_TEMP}/dependency-debs"
          extract_root="${RUNNER_TEMP}/dependency-extract"
          rm -rf "$extract_root"
          mkdir -p "$extract_root/ocs2" "$extract_root/common"

          dpkg-deb -x "$deps_dir/${{ steps.meta.outputs.ocs2_deb_file }}" "$extract_root/ocs2"
          dpkg-deb -x "$deps_dir/${{ steps.meta.outputs.common_deb_file }}" "$extract_root/common"

          sudo rsync -a "$extract_root/ocs2${INSTALL_PREFIX}/" "${INSTALL_PREFIX}/"
          sudo rsync -a "$extract_root/common${INSTALL_PREFIX}/" "${INSTALL_PREFIX}/"

      - name: Prepare bundle sources
        shell: bash
        run: |
          set -eo pipefail

          source_root="${RUNNER_TEMP}/arms-bundle-src"
          rm -rf "$source_root"
          mkdir -p "$source_root"

          rsync -a "${GITHUB_WORKSPACE}/command/" "${source_root}/"
          rsync -a "${GITHUB_WORKSPACE}/controller/" "${source_root}/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/arms_controller_common/" "${source_root}/arms_controller_common/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/gripper_hardware_common/" "${source_root}/gripper_hardware_common/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/ocs2_controller_common/" "${source_root}/ocs2_controller_common/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/lina_planning/" "${source_root}/lina_planning/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/ocs2_humanoid/ocs2_wheel_humanoid/" "${source_root}/ocs2_wheel_humanoid/"
          rsync -a "${GITHUB_WORKSPACE}/libraries/ocs2_humanoid/ocs2_wheel_humanoid_ros/" "${source_root}/ocs2_wheel_humanoid_ros/"

      - name: Install workspace dependencies
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"

          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"

          rosdep install \
            --from-paths "${RUNNER_TEMP}/arms-bundle-src" \
            --ignore-src \
            --rosdistro "${ROS_DISTRO}" \
            --reinstall \
            -r \
            -y \
            --skip-keys "robot_common_launch ocs2_mobile_manipulator ocs2_mobile_manipulator_ros ocs2_ros_interfaces qt5 eigen3"

      - name: Build arms install space
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"

          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"

          build_root="${RUNNER_TEMP}/colcon-arms"
          package_root="${RUNNER_TEMP}/deb-build/package"
          install_prefix="${INSTALL_PREFIX}"
          install_root="${package_root}${install_prefix}"

          rm -rf "$build_root" "$package_root"
          mkdir -p "$build_root" "$package_root"

          colcon --log-base "${build_root}/log" build \
            --base-paths "${RUNNER_TEMP}/arms-bundle-src" \
            --build-base "${build_root}/build" \
            --install-base "${install_root}" \
            --merge-install

          python3 -c "import sys; exec('''import os\ninstall_root = sys.argv[1]\nruntime_prefix = sys.argv[2]\nfor dirpath, _, filenames in os.walk(install_root):\n    for filename in filenames:\n        path = os.path.join(dirpath, filename)\n        try:\n            with open(path, 'r', encoding='utf-8') as f:\n                content = f.read()\n        except Exception:\n            continue\n        if install_root not in content:\n            continue\n        with open(path, 'w', encoding='utf-8') as f:\n            f.write(content.replace(install_root, runtime_prefix))''')" "$install_root" "$install_prefix"

          rm -f \
            "${install_root}/setup.bash" \
            "${install_root}/setup.sh" \
            "${install_root}/setup.zsh" \
            "${install_root}/local_setup.bash" \
            "${install_root}/local_setup.sh" \
            "${install_root}/local_setup.zsh" \
            "${install_root}/_local_setup_util.py" \
            "${install_root}/_local_setup_util_sh.py" \
            "${install_root}/_local_setup_util_ps1.py" \
            "${install_root}/.colcon_install_layout" \
            "${install_root}/COLCON_IGNORE"

          if [[ ! -d "${install_root}/share/ament_index/resource_index/packages" ]]; then
            echo "ament index was not generated in the arms install space." >&2
            exit 1
          fi

      - name: Build deb package
        id: build
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
          VERSION: ${{ steps.meta.outputs.version }}
          DEB_FILE: ${{ steps.meta.outputs.deb_file }}
        run: |
          set -eo pipefail

          package_root="${RUNNER_TEMP}/deb-build/package"
          install_root="${package_root}${INSTALL_PREFIX}"

          mkdir -p "$package_root/DEBIAN"
          installed_size="$(du -sk "$package_root" | cut -f1)"

          cat > "$package_root/DEBIAN/control" <<EOF
          Package: ${PACKAGE_NAME}
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: amd64
          Depends: ros-${ROS_DISTRO}-ros-base, ${OCS2_PACKAGE_NAME}, ${COMMON_PACKAGE_NAME}
          Maintainer: ${GITHUB_REPOSITORY} maintainers <github-actions[bot]@users.noreply.github.com>
          Installed-Size: ${installed_size}
          Description: Prebuilt arms_ros2_control ROS workspace bundle
           Prebuilt ROS packages from arms_ros2_control command, controller, and libraries directories, installed into ${INSTALL_PREFIX} while excluding shared prefix setup files.
          EOF

          if [[ ! -d "${install_root}/share/ocs2_arm_controller" ]]; then
            echo "ocs2_arm_controller was not installed into the package root." >&2
            exit 1
          fi

          dpkg-deb --root-owner-group --build "$package_root" "$DEB_FILE"

          echo "deb_path=${GITHUB_WORKSPACE}/${DEB_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload deb to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          DEB_PATH: ${{ steps.build.outputs.deb_path }}
        run: |
          set -eo pipefail

          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated release for Debian packages."
          fi

          gh release upload "$TAG" "$DEB_PATH" --clobber
