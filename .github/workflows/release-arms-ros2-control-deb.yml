# Sole release path for arms_ros2_control. See README.deb.md.
#   ros-jazzy-arms-ros2-control       — WBC stack (amd64 + arm64)
#   ros-jazzy-arms-ros2-control-full  — WBC + gripper_hardware_common + marvin + modbus + juxie (amd64 + arm64)
# Retired: standalone gripper / per-hardware debs / arms-ros2-control-jazzy-wbc.
# Requires PRIVATE_SUBMODULES_TOKEN (selective submodule init; never submodules: recursive). Debs: install only, no .cpp.

name: Build arms-ros2-control deb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the deb asset to
        required: false
        type: string
      ros_distro:
        description: ROS distro used in the install path
        required: false
        default: jazzy
        type: string
      ocs2_release_tag:
        description: Release tag used to fetch the ocs2_ros2 bundle (optional; leave blank to use the latest release)
        required: false
        type: string
      common_release_tag:
        description: Release tag used to fetch robot_descriptions common (optional; leave blank to use the latest release)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  INSTALL_PREFIX: /opt/ros/jazzy
  OCS2_PACKAGE_NAME: ros-jazzy-ocs2
  OCS2_DEB_FILE_PREFIX: ros-jazzy-ocs2
  COMMON_PACKAGE_NAME: ros-jazzy-robot-descriptions-common
  COMMON_DEB_FILE_PREFIX: ros-jazzy-robot-descriptions-common
  DEFAULT_ROS_DISTRO: jazzy
  PREFERRED_OCS2_RELEASE_REPO: legubiao/ocs2_ros2
  FALLBACK_OCS2_RELEASE_REPO: YangLuo-Bionics/ocs2_ros2
  PREFERRED_COMMON_RELEASE_REPO: fiveages-sim/robot-descriptions-common
  FALLBACK_COMMON_RELEASE_REPO: YangLuo-Bionics/robot-descriptions-common

jobs:
  build_arms_ros2_control_deb:
    if: github.event.repository.fork == false
    name: build ${{ matrix.bundle }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: standard
            package_name: ros-jazzy-arms-ros2-control
            deb_prefix: ros-jazzy-arms-ros2-control
            arch: amd64
            runner: ubuntu-24.04
            ros_distro: jazzy
            image: ros:jazzy-ros-base-noble
          - bundle: standard
            package_name: ros-jazzy-arms-ros2-control
            deb_prefix: ros-jazzy-arms-ros2-control
            arch: arm64
            runner: ubuntu-24.04-arm
            ros_distro: jazzy
            image: ros:jazzy-ros-base-noble
          - bundle: full
            package_name: ros-jazzy-arms-ros2-control-full
            deb_prefix: ros-jazzy-arms-ros2-control-full
            arch: amd64
            runner: ubuntu-24.04
            ros_distro: jazzy
            image: ros:jazzy-ros-base-noble
          - bundle: full
            package_name: ros-jazzy-arms-ros2-control-full
            deb_prefix: ros-jazzy-arms-ros2-control-full
            arch: arm64
            runner: ubuntu-24.04-arm
            ros_distro: jazzy
            image: ros:jazzy-ros-base-noble
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install GitHub CLI
        shell: bash
        run: |
          set -eo pipefail

          apt-get update
          apt-get install -y ca-certificates curl gnupg git

          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list

          apt-get update
          apt-get install -y gh

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize required submodules (HTTPS + PAT)
        shell: bash
        env:
          BUNDLE: ${{ matrix.bundle }}
          SUBMODULE_TOKEN: ${{ secrets.PRIVATE_SUBMODULES_TOKEN }}
        run: |
          set -eo pipefail
          if [[ -z "${SUBMODULE_TOKEN:-}" ]]; then
            echo "::error::PRIVATE_SUBMODULES_TOKEN is not set in arms_ros2_control Actions secrets."
            exit 1
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          export GIT_TERMINAL_PROMPT=0
          # Clear any Authorization extraheader (URL embeds x-access-token; both => "Duplicate header: Authorization" / 400).
          git config --global --unset-all http.https://github.com/.extraheader || true

          check_pat_repo_read() {
            local repo="$1"
            local code
            code="$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${SUBMODULE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/fiveages-sim/${repo}")"
            if [[ "${code}" != "200" ]]; then
              echo "::error::PAT cannot read fiveages-sim/${repo} (HTTP ${code})." >&2
              echo "Fine-grained PAT: Resource owner must be fiveages-sim; grant Contents: Read on this repo; authorize SSO for the org if enabled." >&2
              echo "GitHub often prints 'Write access not granted' for clone 403 — you need read access, not write." >&2
              exit 1
            fi
            echo "PAT can read fiveages-sim/${repo}"
          }

          check_pat_repo_read "lina_planning"
          check_pat_repo_read "ocs2-humanoid"
          check_pat_repo_read "ocs2-wbc-controller"
          if [[ "${BUNDLE}" == "full" ]]; then
            check_pat_repo_read "marvin-ros2-control"
            check_pat_repo_read "modbus-ros2-control"
            check_pat_repo_read "juxie-ros2-control"
            check_pat_repo_read "TJ_FX_ROBOT_CONTRL_SDK"
          fi

          gitmodules_url_to_https() {
            local gitmodules_file="$1"
            local sm_name="$2"
            local old_url new_url host_path
            old_url="$(git config -f "${gitmodules_file}" --get "submodule.${sm_name}.url")"
            if [[ -z "${old_url}" ]]; then
              echo "::error::No submodule.${sm_name}.url in ${gitmodules_file}" >&2
              return 1
            fi
            case "${old_url}" in
              git@github.com:*)
                host_path="${old_url#git@github.com:}"
                ;;
              ssh://git@github.com/*)
                host_path="${old_url#ssh://git@github.com/}"
                ;;
              https://github.com/*)
                host_path="${old_url#https://github.com/}"
                ;;
              https://*@github.com/*)
                host_path="${old_url#*@github.com/}"
                ;;
              *)
                echo "::error::Unsupported submodule URL for ${sm_name}: ${old_url}" >&2
                return 1
                ;;
            esac
            # PAT in URL: required for `git submodule update` (child clone may ignore extraHeader).
            printf '%s\n' "https://x-access-token:${SUBMODULE_TOKEN}@github.com/${host_path}"
          }

          # Use `git -C` + `git config` (no -f .git/config): submodule worktrees use a .git file, not a directory.
          set_submodule_url() {
            local git_cwd="$1"
            local sm_name="$2"
            local new_url="$3"
            local display_url="${new_url#https://x-access-token:*@}"
            git -C "${git_cwd}" config "submodule.${sm_name}.url" "${new_url}"
            echo "submodule ${sm_name} @ ${git_cwd}: ${display_url}"
          }

          init_submodules_at() {
            local git_cwd="$1"
            local gitmodules_file="$2"
            shift 2
            local sm_names=("$@")
            local sm_name new_url
            for sm_name in "${sm_names[@]}"; do
              new_url="$(gitmodules_url_to_https "${gitmodules_file}" "${sm_name}")"
              set_submodule_url "${git_cwd}" "${sm_name}" "${new_url}"
            done
            local -a path_args=()
            for sm_name in "${sm_names[@]}"; do
              path_args+=("$(git config -f "${gitmodules_file}" --get "submodule.${sm_name}.path")")
            done
            git -C "${git_cwd}" submodule update --init --force --depth 1 -- "${path_args[@]}"
          }

          wbc_paths=(
            libraries/lina_planning
            libraries/ocs2_humanoid
            controller/ocs2_wbc_controller
          )
          full_hw_paths=(
            hardwares/marvin_ros2_control
            hardwares/modbus_ros2_control
            hardwares/juxie_ros2_control
          )
          paths=("${wbc_paths[@]}")
          if [[ "${BUNDLE}" == "full" ]]; then
            paths+=("${full_hw_paths[@]}")
          fi
          echo "Initializing monorepo submodules: ${paths[*]}"
          monorepo_sm_names=()
          for path in "${paths[@]}"; do
            monorepo_sm_names+=("${path}")
          done
          init_submodules_at "${GITHUB_WORKSPACE}" "${GITHUB_WORKSPACE}/.gitmodules" "${monorepo_sm_names[@]}"

          if [[ "${BUNDLE}" == "full" ]]; then
            marvin_root="${GITHUB_WORKSPACE}/hardwares/marvin_ros2_control"
            init_submodules_at \
              "${marvin_root}" \
              "${marvin_root}/.gitmodules" \
              "external/TJ_FX_ROBOT_CONTRL_SDK"
          fi

      - name: Verify required sources are present
        shell: bash
        env:
          BUNDLE: ${{ matrix.bundle }}
        run: |
          set -eo pipefail
          ws="${GITHUB_WORKSPACE}"
          for p in \
            libraries/lina_planning/package.xml \
            libraries/ocs2_humanoid/ocs2_wheel_humanoid/package.xml \
            controller/ocs2_wbc_controller/package.xml; do
            if [[ ! -f "${ws}/${p}" ]]; then
              echo "Missing ${p}. Check PRIVATE_SUBMODULES_TOKEN and submodule URLs." >&2
              exit 1
            fi
          done
          if [[ "${BUNDLE}" == "full" ]]; then
            for p in \
              libraries/gripper_hardware_common/package.xml \
              hardwares/marvin_ros2_control/package.xml \
              hardwares/modbus_ros2_control/package.xml \
              hardwares/juxie_ros2_control/package.xml; do
              if [[ ! -f "${ws}/${p}" ]]; then
                echo "Missing ${p} for full bundle." >&2
                exit 1
              fi
            done
            if [[ ! -d "${ws}/hardwares/marvin_ros2_control/external/TJ_FX_ROBOT_CONTRL_SDK" ]]; then
              echo "Missing marvin SDK submodule (recursive checkout required)." >&2
              exit 1
            fi
          fi

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_ROS_DISTRO: ${{ github.event.inputs.ros_distro }}
          INPUT_OCS2_TAG: ${{ github.event.inputs.ocs2_release_tag }}
          INPUT_COMMON_TAG: ${{ github.event.inputs.common_release_tag }}
          MATRIX_ROS_DISTRO: ${{ matrix.ros_distro }}
          DEB_ARCH: ${{ matrix.arch }}
          DEB_PREFIX: ${{ matrix.deb_prefix }}
        run: |
          set -eo pipefail

          # Resolve tag only. Download step tries preferred repo first, then fallback, so we do not pin a single repo here.
          resolve_dependency_release_tag() {
            local requested_tag="$1"
            local primary_repo="$2"
            local fallback_repo="$3"
            local dependency_name="$4"

            if [[ -n "${requested_tag:-}" && "${requested_tag}" != [vV]* ]]; then
              requested_tag="v${requested_tag}"
            fi

            if [[ -n "${requested_tag:-}" ]]; then
              if gh release view "$requested_tag" --repo "$primary_repo" --json tagName >/dev/null 2>&1 \
                || gh release view "$requested_tag" --repo "$fallback_repo" --json tagName >/dev/null 2>&1; then
                printf '%s\n' "$requested_tag"
                return 0
              fi
              echo "Unable to find release tag ${requested_tag} for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
              exit 1
            fi

            local resolved_tag=""
            resolved_tag="$(gh release view --repo "$primary_repo" --json tagName --jq .tagName 2>/dev/null || true)"
            if [[ -n "${resolved_tag}" ]]; then
              printf '%s\n' "$resolved_tag"
              return 0
            fi
            resolved_tag="$(gh release view --repo "$fallback_repo" --json tagName --jq .tagName 2>/dev/null || true)"
            if [[ -n "${resolved_tag}" ]]; then
              printf '%s\n' "$resolved_tag"
              return 0
            fi
            echo "Unable to find any published release for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
            exit 1
          }

          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="$INPUT_TAG"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "A release tag is required for workflow_dispatch." >&2
            exit 1
          fi
          if [[ "${tag}" != [vV]* ]]; then
            tag="v${tag}"
          fi

          version="${tag#v}"
          version="${version#V}"
          version="$(printf '%s' "$version" | sed 's/-/~/g')"

          ros_distro="${INPUT_ROS_DISTRO:-$MATRIX_ROS_DISTRO}"
          if [[ "${ros_distro}" != "${MATRIX_ROS_DISTRO}" ]]; then
            echo "This containerized deb workflow currently supports only ROS 2 ${MATRIX_ROS_DISTRO}." >&2
            echo "Requested: ${ros_distro}" >&2
            exit 1
          fi
          deb_file="${DEB_PREFIX}_${version}_${DEB_ARCH}.deb"

          ocs2_tag="$(resolve_dependency_release_tag \
            "${INPUT_OCS2_TAG:-}" \
            "$PREFERRED_OCS2_RELEASE_REPO" \
            "$FALLBACK_OCS2_RELEASE_REPO" \
            "ocs2_ros2")"

          common_tag="$(resolve_dependency_release_tag \
            "${INPUT_COMMON_TAG:-}" \
            "$PREFERRED_COMMON_RELEASE_REPO" \
            "$FALLBACK_COMMON_RELEASE_REPO" \
            "robot_descriptions")"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ros_distro=$ros_distro" >> "$GITHUB_OUTPUT"
          echo "deb_arch=$DEB_ARCH" >> "$GITHUB_OUTPUT"
          echo "deb_file=$deb_file" >> "$GITHUB_OUTPUT"
          echo "ocs2_tag=$ocs2_tag" >> "$GITHUB_OUTPUT"
          echo "common_tag=$common_tag" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        shell: bash
        run: |
          set -eo pipefail

          apt-get update
          apt-get install -y \
            python3-rosdep \
            python3-colcon-core \
            python3-colcon-common-extensions \
            python3-vcstool \
            python3-pip \
            python3-catkin-pkg-modules \
            sudo \
            zstd \
            fakeroot \
            dpkg-dev \
            rsync \
            build-essential \
            cmake \
            libeigen3-dev \
            libmodbus-dev \
            qtbase5-dev \
            qttools5-dev \
            libqt5svg5-dev \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake-core \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-package

          source "/opt/ros/${{ steps.meta.outputs.ros_distro }}/setup.bash"
          python3 -c "import ament_package; print('ament_package ready:', ament_package.__file__)"

      - name: Prepare rosdep user
        shell: bash
        run: |
          set -eo pipefail
          if ! id -u rosdep >/dev/null 2>&1; then
            useradd --create-home --shell /bin/bash rosdep
          fi
          mkdir -p /home/rosdep/.ros/rosdep
          chown -R rosdep:rosdep /home/rosdep/.ros
          echo "rosdep ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/rosdep
          chmod 0440 /etc/sudoers.d/rosdep

      - name: Cache rosdep sources
        id: cache-rosdep
        uses: actions/cache@v4
        with:
          path: /home/rosdep/.ros/rosdep/sources.cache
          key: rosdep-${{ runner.os }}-${{ matrix.arch }}-${{ steps.meta.outputs.ros_distro }}-${{ hashFiles('**/package.xml') }}
          restore-keys: |
            rosdep-${{ runner.os }}-${{ matrix.arch }}-${{ steps.meta.outputs.ros_distro }}-
            rosdep-${{ runner.os }}-${{ matrix.arch }}-

      - name: Update rosdep sources
        shell: bash
        run: |
          set -eo pipefail
          chown -R rosdep:rosdep /home/rosdep/.ros

          if [[ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]]; then
            PYTHONWARNINGS="ignore:pkg_resources is deprecated as an API:DeprecationWarning" rosdep init
          fi
          if [[ "${{ steps.cache-rosdep.outputs.cache-hit }}" == "true" ]]; then
            echo "Using restored rosdep sources cache."
          else
            sudo -H -u rosdep env \
              PYTHONWARNINGS="ignore:pkg_resources is deprecated as an API:DeprecationWarning" \
              rosdep update
          fi

      - name: Download dependency debs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OCS2_TAG: ${{ steps.meta.outputs.ocs2_tag }}
          COMMON_TAG: ${{ steps.meta.outputs.common_tag }}
          DEB_ARCH: ${{ steps.meta.outputs.deb_arch }}
        run: |
          set -eo pipefail

          deps_dir="${RUNNER_TEMP}/dependency-debs"
          rm -rf "$deps_dir"
          mkdir -p "$deps_dir"

          # Glob patterns: deb names may differ from tag-derived names (epoch, ~, revision suffix). Preferred repo first, then fallback.
          try_download() {
            local tag="$1" repo="$2" label="$3"
            shift 3
            local p
            for p in "$@"; do
              if gh release download "$tag" --repo "$repo" --pattern "$p" --dir "$deps_dir" 2>/dev/null; then
                return 0
              fi
            done
            echo "No asset matched any pattern for ${label} (${repo}@${tag}). Published assets:" >&2
            gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' >&2 || true
            return 1
          }

          try_download_from_repos() {
            local tag="$1" label="$2" primary="$3" fallback="$4"
            shift 4
            local repo
            for repo in "$primary" "$fallback"; do
              if ! gh release view "$tag" --repo "$repo" --json tagName >/dev/null 2>&1; then
                continue
              fi
              if try_download "$tag" "$repo" "$label" "$@"; then
                return 0
              fi
            done
            echo "Could not download ${label} from ${primary} or ${fallback} @ ${tag} (no matching asset)." >&2
            for repo in "$primary" "$fallback"; do
              if gh release view "$tag" --repo "$repo" --json tagName >/dev/null 2>&1; then
                echo "Assets on ${repo}@${tag}:" >&2
                gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' >&2 || true
              fi
            done
            return 1
          }

          try_download_from_repos "$OCS2_TAG" "ocs2" "$PREFERRED_OCS2_RELEASE_REPO" "$FALLBACK_OCS2_RELEASE_REPO" \
            "${OCS2_DEB_FILE_PREFIX}_*_${DEB_ARCH}.deb" \
            "*${OCS2_DEB_FILE_PREFIX}*_${DEB_ARCH}.deb" \
            "ros-jazzy-ocs2-ros2-mobile-manipulator_*_${DEB_ARCH}.deb" \
            "*ocs2*jazzy*mobile-manipulator*_${DEB_ARCH}.deb" \
            "ocs2-ros2-jazzy-mobile-manipulator_*_${DEB_ARCH}.deb"

          try_download_from_repos "$COMMON_TAG" "robot_descriptions common" \
            "$PREFERRED_COMMON_RELEASE_REPO" "$FALLBACK_COMMON_RELEASE_REPO" \
            "${COMMON_DEB_FILE_PREFIX}_*_${DEB_ARCH}.deb" \
            "*${COMMON_DEB_FILE_PREFIX}*_${DEB_ARCH}.deb" \
            "*robot-descriptions*jazzy*common*_${DEB_ARCH}.deb" \
            "robot-descriptions-jazzy-common_*_${DEB_ARCH}.deb"

          resolve_one_deb() {
            local dir="$1" prefix="$2" label="$3"
            shopt -s nullglob
            local matches=("$dir/${prefix}"_*_"${DEB_ARCH}".deb)
            if [[ ${#matches[@]} -eq 0 ]]; then
              matches=("$dir"/*"${prefix}"*_"${DEB_ARCH}".deb)
            fi
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "Expected exactly one ${label} .deb in ${dir}, got ${#matches[@]}: ${matches[*]}" >&2
              ls -la "$dir" >&2 || true
              exit 1
            fi
            printf '%s\n' "${matches[0]}"
          }

          ocs2_path="$(resolve_one_deb "$deps_dir" "$OCS2_DEB_FILE_PREFIX" "OCS2")"
          common_path="$(resolve_one_deb "$deps_dir" "$COMMON_DEB_FILE_PREFIX" "common")"
          {
            echo "OCS2_DEB_PATH=$ocs2_path"
            echo "COMMON_DEB_PATH=$common_path"
          } >> "$GITHUB_ENV"

      - name: Install dependency files into ROS prefix
        shell: bash
        run: |
          set -eo pipefail

          extract_root="${RUNNER_TEMP}/dependency-extract"
          rm -rf "$extract_root"
          mkdir -p "$extract_root/ocs2" "$extract_root/common"

          dpkg-deb -x "$OCS2_DEB_PATH" "$extract_root/ocs2"
          dpkg-deb -x "$COMMON_DEB_PATH" "$extract_root/common"

          rsync -a "$extract_root/ocs2${INSTALL_PREFIX}/" "${INSTALL_PREFIX}/"
          rsync -a "$extract_root/common${INSTALL_PREFIX}/" "${INSTALL_PREFIX}/"

      - name: Remove vendored Marvin SDK prebuilt libraries
        if: matrix.bundle == 'full'
        shell: bash
        run: |
          set -eo pipefail
          sdk="${GITHUB_WORKSPACE}/hardwares/marvin_ros2_control/external/TJ_FX_ROBOT_CONTRL_SDK"
          rm -f \
            "${sdk}/kinematicsSDK/libKine.so" \
            "${sdk}/contrlSDK/libMarvinSDK.so"
          echo "Removed prebuilt libKine.so / libMarvinSDK.so; Marvin SDK will be compiled from source for ${{ matrix.arch }}."

      - name: Prepare bundle sources
        shell: bash
        env:
          BUNDLE: ${{ matrix.bundle }}
        run: |
          set -eo pipefail

          source_root="${RUNNER_TEMP}/arms-bundle-src"
          ws="${GITHUB_WORKSPACE}"
          rm -rf "$source_root"
          mkdir -p "$source_root"

          rsync -a "${ws}/command/" "${source_root}/"
          rsync -a "${ws}/controller/ocs2_arm_controller/" "${source_root}/ocs2_arm_controller/"
          rsync -a "${ws}/controller/basic_joint_controller/" "${source_root}/basic_joint_controller/"
          rsync -a "${ws}/controller/adaptive_gripper_controller/" "${source_root}/adaptive_gripper_controller/"
          rsync -a "${ws}/controller/ocs2_wbc_controller/" "${source_root}/ocs2_wbc_controller/"
          rsync -a "${ws}/libraries/arms_controller_common/" "${source_root}/arms_controller_common/"
          rsync -a "${ws}/libraries/ocs2_controller_common/" "${source_root}/ocs2_controller_common/"
          rsync -a "${ws}/libraries/lina_planning/" "${source_root}/lina_planning/"
          rsync -a "${ws}/libraries/ocs2_humanoid/" "${source_root}/ocs2_humanoid/"

          if [[ "${BUNDLE}" == "full" ]]; then
            rsync -a "${ws}/libraries/gripper_hardware_common/" "${source_root}/gripper_hardware_common/"
            rsync -a "${ws}/hardwares/marvin_ros2_control/" "${source_root}/marvin_ros2_control/"
            rsync -a "${ws}/hardwares/modbus_ros2_control/" "${source_root}/modbus_ros2_control/"
            rsync -a "${ws}/hardwares/juxie_ros2_control/" "${source_root}/juxie_ros2_control/"
          fi

      - name: Install workspace dependencies
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"

          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          sudo -H -u rosdep env \
            PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}" \
            PYTHONWARNINGS="ignore:pkg_resources is deprecated as an API:DeprecationWarning" \
            ROS_DISTRO="${ROS_DISTRO}" \
            RUNNER_TEMP="${RUNNER_TEMP}" \
            bash -lc '
              source "/opt/ros/${ROS_DISTRO}/setup.bash"
              rosdep install \
                --from-paths "${RUNNER_TEMP}/arms-bundle-src" \
                --ignore-src \
                --rosdistro "${ROS_DISTRO}" \
                -r \
                -y \
                --skip-keys "robot_common_launch ocs2_mobile_manipulator ocs2_mobile_manipulator_ros ocs2_ros_interfaces ocs2_wheel_humanoid ocs2_wheel_humanoid_ros lina_planning qt5 eigen3"
            '

      - name: Build arms install space
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"

          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"

          build_root="${RUNNER_TEMP}/colcon-arms"
          package_root="${RUNNER_TEMP}/deb-build/package"
          install_prefix="${INSTALL_PREFIX}"
          install_root="${package_root}${install_prefix}"

          rm -rf "$build_root" "$package_root"
          mkdir -p "$build_root" "$package_root"

          colcon --log-base "${build_root}/log" build \
            --base-paths "${RUNNER_TEMP}/arms-bundle-src" \
            --build-base "${build_root}/build" \
            --install-base "${install_root}" \
            --merge-install \
            --cmake-args -DBUILD_TESTING=OFF

          python3 -c "import sys; exec('''import os\ninstall_root = sys.argv[1]\nruntime_prefix = sys.argv[2]\nfor dirpath, _, filenames in os.walk(install_root):\n    for filename in filenames:\n        path = os.path.join(dirpath, filename)\n        try:\n            with open(path, 'r', encoding='utf-8') as f:\n                content = f.read()\n        except Exception:\n            continue\n        if install_root not in content:\n            continue\n        with open(path, 'w', encoding='utf-8') as f:\n            f.write(content.replace(install_root, runtime_prefix))''')" "$install_root" "$install_prefix"

          rm -f \
            "${install_root}/setup.bash" \
            "${install_root}/setup.sh" \
            "${install_root}/setup.zsh" \
            "${install_root}/setup.ps1" \
            "${install_root}/local_setup.bash" \
            "${install_root}/local_setup.sh" \
            "${install_root}/local_setup.zsh" \
            "${install_root}/local_setup.ps1" \
            "${install_root}/_local_setup_util.py" \
            "${install_root}/_local_setup_util_sh.py" \
            "${install_root}/_local_setup_util_ps1.py" \
            "${install_root}/.colcon_install_layout" \
            "${install_root}/COLCON_IGNORE"

          if [[ ! -d "${install_root}/share/ament_index/resource_index/packages" ]]; then
            echo "ament index was not generated in the arms install space." >&2
            exit 1
          fi
          if [[ ! -d "${install_root}/share/ocs2_wbc_controller" ]]; then
            echo "ocs2_wbc_controller was not installed into the package root." >&2
            exit 1
          fi
          if [[ ! -d "${install_root}/share/lina_planning" ]]; then
            echo "lina_planning was not installed into the package root." >&2
            exit 1
          fi
          if [[ "${{ matrix.bundle }}" == "full" ]]; then
            for pkg in gripper_hardware_common marvin_ros2_control modbus_ros2_control juxie_ros2_control; do
              if [[ ! -d "${install_root}/share/${pkg}" ]]; then
                echo "${pkg} was not installed into the package root." >&2
                exit 1
              fi
            done
          fi

      - name: Build deb package
        id: build
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
          VERSION: ${{ steps.meta.outputs.version }}
          DEB_FILE: ${{ steps.meta.outputs.deb_file }}
          DEB_ARCH: ${{ steps.meta.outputs.deb_arch }}
          PACKAGE_NAME: ${{ matrix.package_name }}
          BUNDLE: ${{ matrix.bundle }}
        run: |
          set -eo pipefail

          package_root="${RUNNER_TEMP}/deb-build/package"
          install_root="${package_root}${INSTALL_PREFIX}"

          mkdir -p "$package_root/DEBIAN"
          installed_size="$(du -sk "$package_root" | cut -f1)"

          if [[ "${BUNDLE}" == "full" ]]; then
            deb_description="Prebuilt arms_ros2_control full bundle for ROS 2 ${ROS_DISTRO}
             Includes WBC stack (lina_planning, ocs2_humanoid, ocs2_wbc_controller) plus gripper_hardware_common, marvin_ros2_control, modbus_ros2_control, juxie_ros2_control. Installed into ${INSTALL_PREFIX} without shared prefix setup files."
            deb_provides=""
          else
            deb_description="Prebuilt arms_ros2_control WBC bundle for ROS 2 ${ROS_DISTRO}
             Includes command, controllers, arms_controller_common, ocs2_controller_common, lina_planning, ocs2_humanoid, ocs2_wbc_controller. Installed into ${INSTALL_PREFIX} without shared prefix setup files."
            deb_provides="Provides: arms-ros2-control-jazzy"
          fi

          cat > "$package_root/DEBIAN/control" <<EOF
          Package: ${PACKAGE_NAME}
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: ${DEB_ARCH}
          Depends: ros-${ROS_DISTRO}-ros-base, ${OCS2_PACKAGE_NAME}, ${COMMON_PACKAGE_NAME}, ros-${ROS_DISTRO}-ament-index-cpp, ros-${ROS_DISTRO}-angles, ros-${ROS_DISTRO}-controller-interface, ros-${ROS_DISTRO}-controller-manager, ros-${ROS_DISTRO}-geometry-msgs, ros-${ROS_DISTRO}-hardware-interface, ros-${ROS_DISTRO}-joint-state-broadcaster, ros-${ROS_DISTRO}-pluginlib, ros-${ROS_DISTRO}-rclcpp-action, ros-${ROS_DISTRO}-rclcpp-lifecycle, ros-${ROS_DISTRO}-sensor-msgs, ros-${ROS_DISTRO}-std-msgs, ros-${ROS_DISTRO}-tf2, ros-${ROS_DISTRO}-tf2-geometry-msgs, ros-${ROS_DISTRO}-tf2-ros, ros-${ROS_DISTRO}-urdf, ros-${ROS_DISTRO}-visualization-msgs
          ${deb_provides}
          Maintainer: ${GITHUB_REPOSITORY} maintainers <github-actions[bot]@users.noreply.github.com>
          Installed-Size: ${installed_size}
          Description: ${deb_description}
          EOF

          if [[ ! -d "${install_root}/share/ocs2_arm_controller" ]]; then
            echo "ocs2_arm_controller was not installed into the package root." >&2
            exit 1
          fi

          dpkg-deb --root-owner-group --build "$package_root" "$DEB_FILE"

          echo "deb_path=${GITHUB_WORKSPACE}/${DEB_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify deb contains no source files
        shell: bash
        env:
          DEB_PATH: ${{ steps.build.outputs.deb_path }}
        run: |
          set -eo pipefail
          check_root="${RUNNER_TEMP}/deb-source-check"
          rm -rf "$check_root"
          mkdir -p "$check_root"
          dpkg-deb -x "$DEB_PATH" "$check_root"
          # Only flag package source trees under */src/* — not rosidl-generated *.c / *__type_support.cpp in include/ or site-packages.
          mapfile -t forbidden < <(find "$check_root" -type f \( \
            -path '*/.git/*' \
            -o -path '*/src/*.cpp' -o -path '*/src/*.cc' -o -path '*/src/*.cxx' -o -path '*/src/*.c' \
            -o -path '*/src/*.h' -o -path '*/src/*.hpp' \
          \) 2>/dev/null || true)
          if [[ ${#forbidden[@]} -gt 0 ]]; then
            echo "Package source tree (*/src/*) or .git metadata found inside ${DEB_PATH}:" >&2
            printf '  %s\n' "${forbidden[@]}" >&2
            exit 1
          fi
          echo "No package */src/* sources or .git metadata in deb (rosidl-generated .c/.cpp allowed)."

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: arms-ros2-control-${{ steps.meta.outputs.version }}-${{ matrix.bundle }}-${{ matrix.arch }}
          path: ${{ steps.meta.outputs.deb_file }}
          if-no-files-found: error
          retention-days: 7

  publish_arms_ros2_control_deb:
    if: github.event.repository.fork == false
    name: publish arms debs
    runs-on: ubuntu-24.04
    needs: build_arms_ros2_control_deb
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ros_distro: ${{ steps.meta.outputs.ros_distro }}
      version: ${{ steps.meta.outputs.version }}
      ocs2_tag: ${{ steps.meta.outputs.ocs2_tag }}
      common_tag: ${{ steps.meta.outputs.common_tag }}

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_ROS_DISTRO: ${{ github.event.inputs.ros_distro }}
          INPUT_OCS2_TAG: ${{ github.event.inputs.ocs2_release_tag }}
          INPUT_COMMON_TAG: ${{ github.event.inputs.common_release_tag }}
        run: |
          set -eo pipefail

          resolve_dependency_release_tag() {
            local requested_tag="$1"
            local primary_repo="$2"
            local fallback_repo="$3"
            local dependency_name="$4"

            if [[ -n "${requested_tag:-}" && "${requested_tag}" != [vV]* ]]; then
              requested_tag="v${requested_tag}"
            fi

            if [[ -n "${requested_tag:-}" ]]; then
              if gh release view "$requested_tag" --repo "$primary_repo" --json tagName >/dev/null 2>&1 \
                || gh release view "$requested_tag" --repo "$fallback_repo" --json tagName >/dev/null 2>&1; then
                printf '%s\n' "$requested_tag"
                return 0
              fi
              echo "Unable to find release tag ${requested_tag} for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
              exit 1
            fi

            local resolved_tag=""
            resolved_tag="$(gh release view --repo "$primary_repo" --json tagName --jq .tagName 2>/dev/null || true)"
            if [[ -n "${resolved_tag}" ]]; then
              printf '%s\n' "$resolved_tag"
              return 0
            fi
            resolved_tag="$(gh release view --repo "$fallback_repo" --json tagName --jq .tagName 2>/dev/null || true)"
            if [[ -n "${resolved_tag}" ]]; then
              printf '%s\n' "$resolved_tag"
              return 0
            fi
            echo "Unable to find any published release for ${dependency_name} in ${primary_repo} or ${fallback_repo}." >&2
            exit 1
          }

          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="$INPUT_TAG"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "A release tag is required for workflow_dispatch." >&2
            exit 1
          fi
          if [[ "${tag}" != [vV]* ]]; then
            tag="v${tag}"
          fi

          ros_distro="${INPUT_ROS_DISTRO:-$DEFAULT_ROS_DISTRO}"
          if [[ "${ros_distro}" != "${DEFAULT_ROS_DISTRO}" ]]; then
            echo "This workflow currently supports only ROS 2 ${DEFAULT_ROS_DISTRO}." >&2
            echo "Requested: ${ros_distro}" >&2
            exit 1
          fi

          version="${tag#v}"
          version="${version#V}"
          version="$(printf '%s' "$version" | sed 's/-/~/g')"

          ocs2_tag="$(resolve_dependency_release_tag \
            "${INPUT_OCS2_TAG:-}" \
            "$PREFERRED_OCS2_RELEASE_REPO" \
            "$FALLBACK_OCS2_RELEASE_REPO" \
            "ocs2_ros2")"

          common_tag="$(resolve_dependency_release_tag \
            "${INPUT_COMMON_TAG:-}" \
            "$PREFERRED_COMMON_RELEASE_REPO" \
            "$FALLBACK_COMMON_RELEASE_REPO" \
            "robot_descriptions")"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ros_distro=$ros_distro" >> "$GITHUB_OUTPUT"
          echo "ocs2_tag=$ocs2_tag" >> "$GITHUB_OUTPUT"
          echo "common_tag=$common_tag" >> "$GITHUB_OUTPUT"

      - name: Download built deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arms-ros2-control-${{ steps.meta.outputs.version }}-*
          merge-multiple: true

      - name: Publish debs to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -eo pipefail

          ls -lh *.deb
          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$TAG" \
              --notes "Automated release: ros-jazzy-arms-ros2-control (WBC) and ros-jazzy-arms-ros2-control-full."
          fi

          gh release upload "$TAG" ./*.deb --repo "${GITHUB_REPOSITORY}" --clobber

  verify_arms_ros2_control_deb:
    if: github.event.repository.fork == false
    name: verify ${{ matrix.bundle }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: publish_arms_ros2_control_deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: standard
            deb_prefix: ros-jazzy-arms-ros2-control
            arch: amd64
            runner: ubuntu-24.04
            image: ros:jazzy-ros-base-noble
          - bundle: standard
            deb_prefix: ros-jazzy-arms-ros2-control
            arch: arm64
            runner: ubuntu-24.04-arm
            image: ros:jazzy-ros-base-noble
          - bundle: full
            deb_prefix: ros-jazzy-arms-ros2-control-full
            arch: amd64
            runner: ubuntu-24.04
            image: ros:jazzy-ros-base-noble
          - bundle: full
            deb_prefix: ros-jazzy-arms-ros2-control-full
            arch: arm64
            runner: ubuntu-24.04-arm
            image: ros:jazzy-ros-base-noble
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Resolve verify metadata
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.publish_arms_ros2_control_deb.outputs.tag }}
          VERSION: ${{ needs.publish_arms_ros2_control_deb.outputs.version }}
          ROS_DISTRO: ${{ needs.publish_arms_ros2_control_deb.outputs.ros_distro }}
          OCS2_TAG: ${{ needs.publish_arms_ros2_control_deb.outputs.ocs2_tag }}
          COMMON_TAG: ${{ needs.publish_arms_ros2_control_deb.outputs.common_tag }}
          DEB_ARCH: ${{ matrix.arch }}
          DEB_PREFIX: ${{ matrix.deb_prefix }}
          BUNDLE: ${{ matrix.bundle }}
        run: |
          set -eo pipefail
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ros_distro=${ROS_DISTRO}" >> "$GITHUB_OUTPUT"
          echo "ocs2_tag=${OCS2_TAG}" >> "$GITHUB_OUTPUT"
          echo "common_tag=${COMMON_TAG}" >> "$GITHUB_OUTPUT"
          echo "deb_arch=${DEB_ARCH}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "deb_file=${DEB_PREFIX}_${VERSION}_${DEB_ARCH}.deb" >> "$GITHUB_OUTPUT"

      - name: Install verification tools
        shell: bash
        run: |
          set -eo pipefail

          apt-get update
          apt-get install -y ca-certificates curl cmake build-essential

          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list

          apt-get update
          apt-get install -y gh

      - name: Download debs from releases
        env:
          GH_TOKEN: ${{ github.token }}
          ARMS_TAG: ${{ steps.meta.outputs.tag }}
          OCS2_TAG: ${{ steps.meta.outputs.ocs2_tag }}
          COMMON_TAG: ${{ steps.meta.outputs.common_tag }}
          DEB_ARCH: ${{ steps.meta.outputs.deb_arch }}
        shell: bash
        run: |
          set -eo pipefail

          deps_dir="${RUNNER_TEMP}/verify-debs"
          rm -rf "$deps_dir"
          mkdir -p "$deps_dir"

          arms_deb="${{ steps.meta.outputs.deb_file }}"
          for attempt in {1..30}; do
            rm -f "${deps_dir}/${arms_deb}"
            if gh release download "$ARMS_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${arms_deb}" \
              --dir "$deps_dir"; then
              break
            fi
            echo "Asset ${arms_deb} is not available yet (attempt ${attempt}/30); retrying in 20s..."
            sleep 20
          done

          try_download() {
            local tag="$1" repo="$2" label="$3"
            shift 3
            local p
            for p in "$@"; do
              if gh release download "$tag" --repo "$repo" --pattern "$p" --dir "$deps_dir" 2>/dev/null; then
                return 0
              fi
            done
            echo "No asset matched any pattern for ${label} (${repo}@${tag}). Published assets:" >&2
            gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' >&2 || true
            return 1
          }

          try_download_from_repos() {
            local tag="$1" label="$2" primary="$3" fallback="$4"
            shift 4
            local repo
            for repo in "$primary" "$fallback"; do
              if ! gh release view "$tag" --repo "$repo" --json tagName >/dev/null 2>&1; then
                continue
              fi
              if try_download "$tag" "$repo" "$label" "$@"; then
                return 0
              fi
            done
            echo "Could not download ${label} from ${primary} or ${fallback} @ ${tag} (no matching asset)." >&2
            return 1
          }

          try_download_from_repos "$OCS2_TAG" "ocs2" "$PREFERRED_OCS2_RELEASE_REPO" "$FALLBACK_OCS2_RELEASE_REPO" \
            "${OCS2_DEB_FILE_PREFIX}_*_${DEB_ARCH}.deb" \
            "*${OCS2_DEB_FILE_PREFIX}*_${DEB_ARCH}.deb" \
            "ros-jazzy-ocs2-ros2-mobile-manipulator_*_${DEB_ARCH}.deb" \
            "*ocs2*jazzy*mobile-manipulator*_${DEB_ARCH}.deb" \
            "ocs2-ros2-jazzy-mobile-manipulator_*_${DEB_ARCH}.deb"

          try_download_from_repos "$COMMON_TAG" "robot_descriptions common" \
            "$PREFERRED_COMMON_RELEASE_REPO" "$FALLBACK_COMMON_RELEASE_REPO" \
            "${COMMON_DEB_FILE_PREFIX}_*_${DEB_ARCH}.deb" \
            "*${COMMON_DEB_FILE_PREFIX}*_${DEB_ARCH}.deb" \
            "*robot-descriptions*jazzy*common*_${DEB_ARCH}.deb" \
            "robot-descriptions-jazzy-common_*_${DEB_ARCH}.deb"

          resolve_one_deb() {
            local dir="$1" prefix="$2" label="$3"
            shopt -s nullglob
            local matches=("$dir/${prefix}"_*_"${DEB_ARCH}".deb)
            if [[ ${#matches[@]} -eq 0 ]]; then
              matches=("$dir"/*"${prefix}"*_"${DEB_ARCH}".deb)
            fi
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "Expected exactly one ${label} .deb in ${dir}, got ${#matches[@]}: ${matches[*]}" >&2
              ls -la "$dir" >&2 || true
              exit 1
            fi
            printf '%s\n' "${matches[0]}"
          }

          if [[ ! -f "${deps_dir}/${arms_deb}" ]]; then
            echo "Timed out waiting for ${arms_deb} in release ${ARMS_TAG}." >&2
            gh release view "$ARMS_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name' || true
            exit 1
          fi

          {
            echo "ARMS_DEB_PATH=${deps_dir}/${arms_deb}"
            echo "OCS2_DEB_PATH=$(resolve_one_deb "$deps_dir" "$OCS2_DEB_FILE_PREFIX" "OCS2")"
            echo "COMMON_DEB_PATH=$(resolve_one_deb "$deps_dir" "$COMMON_DEB_FILE_PREFIX" "common")"
          } >> "$GITHUB_ENV"

          ls -lh "$deps_dir"/*.deb

      - name: Install debs and verify package discovery
        shell: bash
        run: |
          set -eo pipefail

          ros_distro="${{ steps.meta.outputs.ros_distro }}"

          dpkg -i "$OCS2_DEB_PATH" "$COMMON_DEB_PATH" "$ARMS_DEB_PATH" || apt-get -f install -y

          set +u
          source "/opt/ros/${ros_distro}/setup.bash"
          set -u
          export CMAKE_PREFIX_PATH="${INSTALL_PREFIX}:${CMAKE_PREFIX_PATH:-}"
          export AMENT_PREFIX_PATH="${INSTALL_PREFIX}:${AMENT_PREFIX_PATH:-}"

          python3 - <<'PY'
          import os
          from ament_index_python.packages import get_package_share_directory

          bundle = os.environ["VERIFY_BUNDLE"]
          packages = [
              "arms_ros2_control_msgs",
              "arms_controller_common",
              "ocs2_controller_common",
              "basic_joint_controller",
              "adaptive_gripper_controller",
              "ocs2_arm_controller",
              "ocs2_wbc_controller",
              "lina_planning",
          ]
          if bundle == "full":
              packages.extend([
                  "gripper_hardware_common",
                  "marvin_ros2_control",
                  "modbus_ros2_control",
                  "juxie_ros2_control",
              ])
          for package_name in packages:
              print(package_name, get_package_share_directory(package_name))
          PY
        env:
          VERIFY_BUNDLE: ${{ matrix.bundle }}

      - name: Verify downstream CMake discovery
        shell: bash
        env:
          VERIFY_BUNDLE: ${{ matrix.bundle }}
        run: |
          set -eo pipefail
          ros_distro="${{ steps.meta.outputs.ros_distro }}"
          set +u
          source "/opt/ros/${ros_distro}/setup.bash"
          set -u
          export CMAKE_PREFIX_PATH="${INSTALL_PREFIX}:${CMAKE_PREFIX_PATH:-}"
          export AMENT_PREFIX_PATH="${INSTALL_PREFIX}:${AMENT_PREFIX_PATH:-}"

          rm -rf downstream_check
          mkdir -p downstream_check
          cat > downstream_check/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(arms_ros2_control_downstream_check CXX)

          set(CMAKE_BUILD_TYPE Release CACHE STRING "" FORCE)
          set(Boost_USE_DEBUG_RUNTIME OFF CACHE BOOL "" FORCE)

          find_package(arms_controller_common REQUIRED)
          find_package(ocs2_controller_common REQUIRED)
          find_package(basic_joint_controller REQUIRED)
          find_package(adaptive_gripper_controller REQUIRED)
          find_package(ocs2_arm_controller REQUIRED)
          find_package(ocs2_wbc_controller REQUIRED)
          find_package(lina_planning REQUIRED)
          EOF

          if [[ "${VERIFY_BUNDLE}" == "full" ]]; then
            cat >> downstream_check/CMakeLists.txt <<'EOF'
          find_package(gripper_hardware_common REQUIRED)
          find_package(marvin_ros2_control REQUIRED)
          find_package(modbus_ros2_control REQUIRED)
          find_package(juxie_ros2_control REQUIRED)
          EOF
          fi

          cmake -Wno-dev \
            -DCMAKE_BUILD_TYPE=Release \
            -DBoost_USE_DEBUG_RUNTIME=OFF \
            -S downstream_check \
            -B downstream_check/build
